name: CI-LINT-TEST-BUILD
on:
  push:
    branches: [ dev ]

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install -r server/requirements.txt; pylint -d C0114,C0115,C0116 server/app.py

  unit-tests:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install -r server/requirements.txt; pytest --junitxml=junit/test-results.xml server/

  build-test:
    needs: [lint, unit-tests]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t test-image ./server --file ./server/dockerfile
      - run: docker run -d --name app-server -p 8000:8000 test-image
      - run: sleep 5
      - run: curl 127.0.0.1:8000
