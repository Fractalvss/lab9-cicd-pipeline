apiVersion: apps/v1
kind: Deployment
metadata:
  name: lab9-app
  labels:
    app: lab9-app
    release-date: RELEASE-DATE
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lab9-app
  template:
    metadata:
      labels:
        app: lab9-app
    spec:
      containers:
      - name: lab9-server
        image: Fractalvss/lab9-app:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
